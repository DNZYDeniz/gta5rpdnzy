<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DNZY RP</title>

  <style>
    :root{
      --text: #eaeaea;
      --muted: rgba(255,255,255,0.72);
      --accent: #ffd54a; /* Sarı */
      --accent2: #ffb300;
      --danger: #ff5555;
      --success: #4aff85;
      --box-bg: rgba(0,0,0,0.85); /* Koyu Siyah Opak */
    }

    /* ✅ Temel Ayarlar */
    *{
      box-sizing:border-box;
      outline:none;
      font-family: 'Segoe UI', sans-serif;
      user-select:none;
      -webkit-font-smoothing: antialiased;
    }

    html, body{
      margin:0; padding:0; height:100%;
      overflow:hidden;
      background: transparent; /* Oyun içi şeffaf */
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Sayfa Geçiş Animasyonları */
    /* 1. Arka plandaki BÜYÜK SİYAH KAREYİ YOK ETME KODU */
    .glass-card {
      position: absolute;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      
      /* Burası önemli: Arkayı tamamen şeffaf yapıyoruz */
      background: transparent !important;
      backdrop-filter: none !important;
      box-shadow: none !important;
      border: none !important;
      
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      transition: all 0.5s ease;
      pointer-events: none; /* Boşluğa tıklamayı engeller */
    }
    .glass-card.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    /* ---------------------------
       1. SAYFA: WELCOME
    --------------------------- */
    .welcome-inner{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 20px;
    }

    .logo-img{
      width: min(800px, 90vw);
      height:auto;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    .enter-btn{
      padding: 15px 30px;
      border-radius: 50px; /* Yuvarlak buton */
      background: rgba(0,0,0,0.7);
      border: 3px solid var(--accent);
      color: #fff;
      display:flex;
      align-items:center;
      gap:15px;
      cursor:pointer;
      transition: transform 0.2s;
    }
    .enter-btn:hover{ transform: scale(1.05); }
    
    .enter-key{
      background: var(--accent);
      color: #000;
      font-weight:900;
      padding: 5px 10px;
      border-radius: 8px;
    }
    .enter-text{ text-align:left; }
    .enter-title{ color:var(--accent); font-weight:bold; font-size:1.1rem; }
    .enter-desc{ font-size:0.85rem; opacity:0.8; max-width:400px; }


    /* ---------------------------
       2. SAYFA: AUTH (GİRİŞ/KAYIT) - YENİ TASARIM
    --------------------------- */

    /* ✅ KUTU TASARIMI: Kare değil, Oval/Rounded */
    .auth-box {
      width: 480px;
      /* Koyu Siyah Arka Plan */
      background: rgba(0, 0, 0, 0.9); 
      /* Sarı Çerçeve */
      border: 3px solid #ffd54a;
      /* Yuvarlatılmış Köşeler */
      border-radius: 40px;
      
      padding: 30px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }

    /* ✅ SEKMELER (Giriş / Kayıt) */
    .tabs{
      display:flex;
      background: rgba(255,255,255,0.08); /* Sekme arkası hafif gri */
      border-radius: 30px; /* Sekmeleri de yuvarladık */
      padding: 5px;
    }

    .tab{
      flex:1;
      text-align:center;
      padding: 12px;
      font-weight: 800;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      cursor:pointer;
      border-radius: 25px; /* İç butonlar da yuvarlak */
      transition: all 0.3s;
    }

    /* Aktif olan sekme sarı oluyor */
    .tab.active{
      background: var(--accent);
      color: #1a1a1a;
      box-shadow: 0 4px 15px rgba(255, 213, 74, 0.3);
    }

    /* ✅ INPUTLAR */
    .inp-group label{
      display:block;
      margin-left: 15px; /* Yazıyı biraz içe ittik */
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .inp{
      width:100%;
      background: rgba(255,255,255,0.07);
      border: 2px solid transparent;
      padding: 14px 20px;
      border-radius: 25px; /* Inputlar da yuvarlak */
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
    }
    .inp:focus{
      background: rgba(0,0,0,0.5);
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(255, 213, 74, 0.15);
    }
    .inp::placeholder{ color: rgba(255,255,255,0.3); }

    /* ✅ GİRİŞ BUTONU */
    .btn-main{
      width:100%;
      padding: 16px;
      margin-top: 10px;
      border-radius: 30px; /* Buton tam yuvarlak */
      border: none;
      background: var(--accent); /* Sarı */
      color: #000;
      font-weight: 900;
      font-size: 16px;
      cursor:pointer;
      box-shadow: 0 5px 20px rgba(255, 213, 74, 0.25);
      transition: transform 0.1s, filter 0.2s;
    }
    .btn-main:hover{
      filter: brightness(1.1);
      transform: scale(1.02);
    }
    .btn-main:active{ transform: scale(0.98); }
    .btn-main:disabled{ background: #555; color:#888; cursor:not-allowed; }

    /* Hata Mesajı */
    .error-msg{
      color: var(--danger);
      text-align: center;
      font-weight: bold;
      font-size: 14px;
      display:none;
      background: rgba(255, 85, 85, 0.1);
      padding: 10px;
      border-radius: 15px;
    }

    /* Loader */
    .loader{
      display:none; width: 24px; height: 24px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

  </style>
</head>

<body>
  <div class="wrap">

    <div id="page-welcome" class="glass-card active">
      <div class="welcome-inner">
        <img class="logo-img" src="./logo.png" alt="DNZY RP" />

        <div class="enter-btn" id="enterTrigger">
          <span class="enter-key">ENTER</span>
          <div class="enter-text">
            <div class="enter-title">DNZY ROLEPLAY</div>
            <div class="enter-desc">Başlamak için tıklayın veya Enter'a basın.</div>
          </div>
        </div>
      </div>
    </div>
<div id="page-auth" class="glass-card">
      <div class="auth-box">
        
        <div class="tabs">
          <div class="tab active" data-tab="login">GİRİŞ</div>
          <div class="tab" data-tab="register">KAYIT OL</div>
        </div>

        <div id="errMsg" class="error-msg">Hata Mesajı</div>

        <div class="inp-group">
          <label>E-Posta</label>
          <input type="email" id="in_email" class="inp" placeholder="mail@dnzy.com">
        </div>

        <div class="inp-group">
          <label>Şifre</label>
          <input type="password" id="in_pass" class="inp" placeholder="••••••••">
        </div>

        <button id="btnAction" class="btn-main" type="button">
          <span id="btnTxt">GİRİŞ YAP</span>
          <div class="loader" id="btnLoad"></div>
        </button>

      </div>
    </div>

  </div>

  <script>
    /* -----------------------------------------------
       JAVASCRIPT MANTIĞI
    ----------------------------------------------- */
    let currentTab = 'login';
    let isLocked = false;
    let welcomeSent = false;

    // Elementler
    const pWelcome = document.getElementById('page-welcome');
    const pAuth = document.getElementById('page-auth');
    const btnAction = document.getElementById('btnAction');
    const btnTxt = document.getElementById('btnTxt');
    const btnLoad = document.getElementById('btnLoad');
    const errMsg = document.getElementById('errMsg');
    const tabEls = Array.from(document.querySelectorAll('.tab'));

    // --- Sayfa Geçişleri ---
    function sendWelcome() {
      if (welcomeSent) return;
      welcomeSent = true;
      if ('mp' in window) mp.trigger('dnzy:welcome:enter');
      else window.__dnzyGoAuth(); // Test için tarayıcıda geçiş
    }

    // Oyun tarafından çağrılacak fonksiyon (Auth ekranını açar)
    window.__dnzyGoAuth = function(){
      pWelcome.classList.remove('active');
      pAuth.classList.add('active');
      setTimeout(() => document.getElementById('in_email').focus(), 300);
    }

    // --- Tab Değiştirme ---
    tabEls.forEach(t => {
      t.addEventListener('click', () => {
        if(isLocked) return;
        
        // Aktif sınıfını güncelle
        tabEls.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        
        currentTab = t.dataset.tab;
        btnTxt.innerText = (currentTab === 'register') ? 'HESAP OLUŞTUR' : 'GİRİŞ YAP';
        errMsg.style.display = 'none';
      });
    });

    // --- Giriş / Kayıt Butonu ---
    btnAction.addEventListener('click', () => {
      if (isLocked) return;

      const email = document.getElementById('in_email').value.trim();
      const pass = document.getElementById('in_pass').value;

      // Basit doğrulama
      if (!email || !pass) return showError("Lütfen tüm alanları doldurun.");
      if (currentTab === 'register' && pass.length < 6) return showError("Şifre çok kısa.");

      setLoading(true);

      const payload = { email, password: pass };
      if ('mp' in window) {
        mp.trigger(`dnzy:auth:${currentTab}`, JSON.stringify(payload));
      } else {
        // Test modu simülasyonu
        setTimeout(() => { showError("Oyun bağlantısı yok (Test Modu)"); setLoading(false); }, 1000);
      }
    });

    // --- Yardımcı Fonksiyonlar ---
    function setLoading(state){
      isLocked = state;
      btnAction.disabled = state;
      btnTxt.style.display = state ? 'none' : 'block';
      btnLoad.style.display = state ? 'block' : 'none';
    }

    function showError(msg){
      errMsg.innerText = msg;
      errMsg.style.display = 'block';
    }

    // Enter Tuşu Desteği
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (pWelcome.classList.contains('active')) sendWelcome();
      else if (pAuth.classList.contains('active')) btnAction.click();
    });

    document.getElementById('enterTrigger').addEventListener('click', sendWelcome);

    // Hata/Başarı Callbackleri (Client-side'dan çağrılır)
    window.__dnzyAuthFail = function(msg){
      setLoading(false);
      showError(msg);
    }
    window.__dnzyAuthOk = function(){
      setLoading(false);
      btnAction.style.background = "var(--success)";
      btnTxt.innerText = "GİRİŞ BAŞARILI";
      btnTxt.style.display = "block";
      btnLoad.style.display = "none";
      isLocked = true;
    }

  </script>
</body>
</html>
