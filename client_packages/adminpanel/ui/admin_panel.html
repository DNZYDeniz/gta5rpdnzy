<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body {
            background: transparent;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            overflow: hidden;
            margin: 0;
        }

        .panel-container {
            position: absolute;
            top: 5vh;
            right: 2vw;
            width: 320px;
            background: linear-gradient(180deg, rgba(15,15,15,0.98) 0%, rgba(5,5,5,0.95) 100%);
            border: 1px solid #FFD700;
            border-top: 4px solid #FFD700;
            border-radius: 8px;
            padding: 15px;
            display: none;
            color: #ecf0f1;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #FFD700;
            margin: 0 0 15px 0;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        /* Sekme Butonları */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            background: #222;
            color: #888;
            border: none;
            padding: 8px 0;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn:hover { background: #333; }
        
        .tab-btn.active {
            background: #FFD700;
            color: black;
        }

        /* İçerik Alanları */
        .content { display: none; animation: fadeEffect 0.4s; }
        .content.active { display: block; }

        input, select {
            width: 93%;
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
            outline: none;
        }

        .label { font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }

        button.action-btn {
            width: 100%;
            background: linear-gradient(45deg, #cfb53b, #FFD700);
            border: none;
            color: black;
            font-weight: bold;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 5px;
            text-transform: uppercase;
            font-size: 11px;
        }

        button.action-btn:hover { transform: translateY(-2px); }

        @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div class="panel-container" id="adminMenu">
        <h2>YÖNETİM PANELİ</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('genel')">GENEL</button>
            <button class="tab-btn" onclick="openTab('ev')">EV</button>
            <button class="tab-btn" onclick="openTab('garaj')">GARAJ</button>
            <button class="tab-btn" onclick="openTab('heli')">HELİ</button>
        </div>

        <div id="genel" class="content active">
            <div class="label">Araç İşlemleri</div>
            <input type="text" id="vehName" placeholder="Model (örn: t20)">
            <button class="action-btn" onclick="sendData('spawnCar', 'vehName')">ARACI GETİR</button>
            
            <div style="margin-top:15px;" class="label">Oyuncu</div>
            <button class="action-btn" style="background:#2ecc71" onclick="sendData('healSelf')">İYİLEŞTİR</button>
            <input type="number" id="moneyAmount" style="margin-top:5px;" placeholder="Miktar">
            <button class="action-btn" onclick="sendData('giveMoney', 'moneyAmount')">PARA VER</button>
        </div>

        <div id="ev" class="content">
            <div class="label">Ev Fiyatı ($)</div>
            <input type="number" id="housePrice" placeholder="150000">

            <div class="label">İç Mekan (Interior) Seç</div>
            <select id="houseInt">
                <option value="1">Standart Daire (Orta)</option>
                <option value="2">Lüks Rezidans (Pahalı)</option>
                <option value="3">Motel Odası (Ucuz)</option>
                <option value="4">Villa (Garajlı)</option>
                <option value="5">Ofis / Plaza</option>
            </select>

            <button class="action-btn" onclick="createProperty('createHouse')">BURAYA EV KUR</button>
        </div>

        <div id="garaj" class="content">
            <div class="label">Garaj Tipi</div>
            <select id="garageType">
                <option value="public">Genel Otopark</option>
                <option value="private">Özel Garaj</option>
            </select>
            <button class="action-btn" onclick="createProperty('createGarage')">GARAJ GİRİŞİ KOY</button>
            <p style="font-size:10px; color:#888;">* Durduğun yer giriş kapısı olacaktır.</p>
        </div>

        <div id="heli" class="content">
            <div class="label">Helipad Ayarı</div>
            <button class="action-btn" onclick="createProperty('createHelipad')">HELİPAD NOKTASI KUR</button>
            <p style="font-size:10px; color:#888;">
                * Durduğun yer menü olur.<br>
                * Baktığın yöne 4 metre ileriye helikopter iner.
            </p>
        </div>

    </div>

    <script>
        function togglePanel(status) {
            document.getElementById('adminMenu').style.display = status ? 'block' : 'none';
        }

        function openTab(tabName) {
            // Hepsini gizle
            document.querySelectorAll('.content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            
            // Seçileni aç
            document.getElementById(tabName).classList.add('active');
            // Tıklanan butonu aktif yap (event bubbling ile yakalıyoruz basitçe)
            event.target.classList.add('active');
        }

        function sendData(action, inputId = null) {
            let val = inputId ? document.getElementById(inputId).value : null;
            if('mp' in window) mp.trigger('client:adminAction', action, val);
        }

        function createProperty(type) {
            let data = {};
            if(type === 'createHouse') {
                data = {
                    price: document.getElementById('housePrice').value,
                    interior: document.getElementById('houseInt').value
                };
            } else if (type === 'createGarage') {
                data = { type: document.getElementById('garageType').value };
            }
            // JSON paketle ve gönder
            if('mp' in window) mp.trigger('client:adminAction', type, JSON.stringify(data));
        }
    </script>
</body>
</html>
