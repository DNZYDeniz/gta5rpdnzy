<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-wrapper">
        <div id="msg-list" class="message-list"></div>
        
        <div class="channel-tabs" id="channel-tabs" style="opacity: 0;">
            <div class="tab active" onclick="setChannel('all')">GENEL</div>
            <div class="tab" onclick="setChannel('family')">AİLE</div>
            <div class="tab" onclick="setChannel('me')">ME (Hareket)</div>
            <div class="tab" onclick="setChannel('do')">DO (Durum)</div>
        </div>

        <div class="input-area">
            <span id="channel-badge">GENEL</span>
            <input type="text" id="chat-input" maxlength="140" placeholder="Mesaj yaz..." autocomplete="off">
            <div id="char-counter">0/140</div>
        </div>
    </div>

    <script>
        const MAX_MESSAGES = 60; 
        const SPAM_COOLDOWN = 500; 
        let lastMsgTime = 0;
        let currentChannel = 'all'; // Varsayılan kanal
        
        const msgList = document.getElementById('msg-list');
        const input = document.getElementById('chat-input');
        const counter = document.getElementById('char-counter');
        const inputArea = document.querySelector('.input-area');
        const tabsArea = document.getElementById('channel-tabs');
        const badge = document.getElementById('channel-badge');
        const tabs = document.querySelectorAll('.tab');

        // Kanal Değiştirme Fonksiyonu
        function setChannel(channel) {
            currentChannel = channel;
            
            // Tab renklerini güncelle
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Badge güncelle
            if(channel === 'all') { badge.innerText = "GENEL"; badge.style.color = "#fff"; }
            if(channel === 'family') { badge.innerText = "AİLE"; badge.style.color = "#00ff00"; }
            if(channel === 'me') { badge.innerText = "ME"; badge.style.color = "#d67aff"; }
            if(channel === 'do') { badge.innerText = "DO"; badge.style.color = "#60a3bc"; }

            input.focus();
        }

        // --- Standart Fonksiyonlar ---
        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
            });
        }

        function formatColors(text) {
            let safeText = escapeHtml(text);
            return safeText.replace(/!\{([0-9A-Fa-f]{6})\}/g, (match, color) => {
                return `<span style="color: #${color}">`;
            }) + '</span>'.repeat((safeText.match(/!\{/g) || []).length);
        }

        function addMessage(text) {
            const div = document.createElement('div');
            div.className = 'msg-item';
            div.innerHTML = formatColors(text);
            msgList.appendChild(div);
            msgList.scrollTop = msgList.scrollHeight;

            while (msgList.children.length > MAX_MESSAGES) {
                msgList.removeChild(msgList.firstChild);
            }
        }

        function toggleInput(state) {
            inputArea.style.opacity = state ? "1" : "0";
            tabsArea.style.opacity = state ? "1" : "0"; // Tabları da aç/kapat
            if (state) {
                input.value = "";
                input.focus();
                updateCounter();
            } else {
                input.blur();
            }
        }

        function updateCounter() { counter.innerText = `${input.value.length}/140`; }

        input.addEventListener('input', updateCounter);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const now = Date.now();
                if (now - lastMsgTime < SPAM_COOLDOWN) return; 
                
                const text = input.value.trim();
                if (text.length > 0) {
                    lastMsgTime = now;
                    // Hangi kanalda yazdıysa onu da gönderiyoruz
                    if ('mp' in window) mp.trigger('chat:submit', text, currentChannel);
                }
                if ('mp' in window) mp.trigger('chat:close');
            }
        });

        window.api = { push: addMessage, toggle: toggleInput, clear: () => msgList.innerHTML = "" };
    </script>
</body>
</html>
